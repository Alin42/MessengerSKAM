openapi: 3.0.0

info:
  title: Messenger API
  version: 1.0.0

servers:
  - url: http://localhost:8080/api

tags:
  - name: Auth
  - name: Users
  - name: Chats
  - name: Messages
  - name: Participants

# ================= PATHS =================

paths:

  # ================= AUTH =================

  /auth/register:
    post:
      summary: Register user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        "200":
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "400":
          description: Invalid request
        "409":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 409
                  message: User already exists
        "500":
          description: Internal server error

  /auth/login:
    post:
      summary: Login user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "400":
          description: Invalid request
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 401
                  message: Invalid token
        "500":
            description: Internal server error

  /auth/logout:
    post:
      summary: Logout user
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 401
                  message: Invalid session_token
        "500":
            description: Internal server error

  # ================= USERS =================

  /users/me:
    get:
      summary: Get current user
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 401
                  message: Invalid session_token
        "500":
          description: Internal server error

    delete:
      summary: Delete current user
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User deleted
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 401
                  message: Invalid session_token
        "500":
          description: Internal server error

  # ================= CHATS =================

  /chats:
    get:
      summary: Get user chats
      tags: [Chats]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Chats list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Chat'
              examples:
                chats_list:
                  summary: List of chats
                  value:
                    - id: 1
                      type: group
                      chat_token: "fa958f85-5e0d-4384-af51-fd10821ff2ec"
                      name: "MathematicianGroup"
                      created_at: "2026-04-20T12:00:00Z"
                      last_message_at: "2026-04-20T12:10:00Z"

                    - id: 2
                      type: contact
                      chat_token: null
                      name: null
                      created_at: "2026-04-20T10:00:00Z"
                      last_message_at: null
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 401
                  message: Invalid session_token
        "500":
          description: Internal server error

    post:
      summary: Create chat
      tags: [Chats]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChatRequest'
      responses:
        "201":
          description: Chat created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chat'
        "422":
          description: "Incorrect chat name"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 401
                  message: Invalid session_token
        "500":
          description: Internal server error

  /chats/{chat_id}:
    get:
      summary: Get chat by id
      tags: [Chats]
      security:
        - bearerAuth: []
      parameters:
        - name: chat_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Chat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chat'
        "400":
          description: Invalid request
        "404":
          description: Chat not found
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 401
                  message: Invalid session_token
        "500":
          description: Internal server error

    delete:
      summary: Delete chat
      tags: [Chats]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Chat deleted
        "400":
          description: Invalid request
        "403":
          description: Forbidden (not owner)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /chats/join:
    post:
      summary: Join chat by token
      tags: [Chats]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinChatRequest'
      responses:
        "200":
          description: Joined chat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chat'
        "400":
          description: Invalid token
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: 401
                  message: Invalid session_token
        "404":
          description: Chat not found
        "500":
          description: Internal server error

  /chats/{chat_id}/leave:
    post:
      summary: Leave chat
      tags: [Chats]
      security:
        - bearerAuth: []
      parameters:
        - name: chat_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Left chat
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "403":
          description: Not a participant
        "404":
          description: Chat not found
        "500":
          description: Internal server error

  # ================= MESSAGES =================

  /chats/{chat_id}/messages:
    get:
      summary: Get messages in chat
      tags: [Messages]
      security:
        - bearerAuth: []
      parameters:
        - name: chat_id
          in: path
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Messages list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
              examples:
                messages_list:
                  summary: messages of chat
                  value:
                    - id: 1
                      chat_id: 1
                      sender_id: 1
                      content: "Hello MathematicianGroup"
                      created_at: "2026-04-20T12:10:00Z"
                    - id: 2
                      chat_id: 1
                      sender_id: 1
                      content: "Topology better geometry"
                      created_at: "2026-04-20T12:11:00Z"
    post:
      summary: Send message
      tags: [Messages]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        "201":
          description: Message created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "403":
          description: Not a chat member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Chat not found

  /messages/{message_id}:
    delete:
      summary: Delete message
      tags: [Messages]
      security:
        - bearerAuth: []
      parameters:
        - name: message_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Message deleted
        "400":
          description: Invalid request
        "403":
          description: Forbidden (not your message)
        "404":
          description: Message not found

  # ================= PARTICIPANTS =================

  /chats/{chat_id}/participants:
    get:
      summary: Get chat participants
      tags: [Participants]
      security:
        - bearerAuth: []
      parameters:
      - name: chat_id
        in: path
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Participants list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Participant'
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "404":
          description: Chat not found

    post:
      summary: Add participant
      tags: [Participants]
      security:
        - bearerAuth: []
      parameters:
      - name: chat_id
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddParticipantRequest'
      responses:
        "201":
          description: Participant created
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden (not admin)
        "404":
          description: Chat not found
        "409":
          description: Already in chat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        
  /chats/{chat_id}/participants/{user_id}:
    delete:
      summary: Remove participant
      tags: [Participants]
      security:
        - bearerAuth: []
      parameters:
      - name: chat_id
        in: path
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Participant removed
        "400":
          description: Invalid request          
        "401":
          description: Unauthorized
        "404":
          description: Chat not found

# ================= COMPONENTS =================

components:

  securitySchemes:

    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: UUID

  schemas:

    # ---------- AUTH ----------

    RegisterRequest:
      type: object
      required: [login]
      properties:
        login:
          type: string
      example:
        login : ivan2005

    LoginRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
      example:
        token: 210b53ac-138b-47db-8ec5-7fe6a838d07b

    AuthResponse:
      type: object
      properties:
        message:
          type: string
        user:
          $ref: '#/components/schemas/User'
        session_token:
          type: string
      example:
          message: User authenticated
          session_token: 210b53ac-138b-47db-8ec5-7fe6a838d07b

    # ---------- USER ----------

    User:
      type: object
      properties:
        id:
          type: integer
        login:
          type: string
      example:
          id: 1
          login: ivan2005

    # ---------- CHAT ----------

    Chat:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [contact, group]
        chat_token:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        last_message_at:
          type: string
          format: date-time
          nullable: true
      example:
        id: 1
        type: group
        chat_token: "fa958f85-5e0d-4384-af51-fd10821ff2ec"
        name: "MathematicianGroup"
        created_at: "2026-04-20T12:00:00Z"
        last_message_at: "2026-04-20T12:10:00Z"

    CreateChatRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
      example:
        name: MathematicianGroup

    JoinChatRequest:
      type: object
      required: [chat_token, type]
      properties:
        chat_token:
          type: string
        type:
          type: string
      example:
        chat_token: 4fec9a14-f8d9-4b71-8bc6-24a806a78925
        type: Group

    # ---------- PARTICIPANTS ----------

    Participant:
      type: object
      properties:
        user_id:
          type: integer
        chat_id:
          type: integer
        joined_at:
          type: string
          format: date-time
        last_viewed:
          type: string
          format: date-time
      example:
        user_id: 1
        chat_id: 1
        joined_at: "2026-04-20T12:00:00Z"
        last_viewed: "2026-04-20T12:10:00Z"

    AddParticipantRequest:
      type: object
      properties:
        invite_token:
          type: string
        user_id:
          type: integer
      example:
        invite_token: 39785524-6b37-4c87-89d8-28ee1f8a1ce7

    # ---------- MESSAGES ----------

    Message:
      type: object
      properties:
        id:
          type: integer
        chat_id:
          type: integer
        sender_id:
          type: integer
        content:
          type: string
        created_at:
          type: string
          format: date-time
      example:
        id: 1
        chat_id: 1
        sender_id: 1
        content: "Hello MathematicianGroup"
        created_at: "2026-04-20T12:10:00Z"

    SendMessageRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
      example:
        content: "Hello MathematicianGroup"

    # ---------- ERROR ----------

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: integer
            message:
              type: string